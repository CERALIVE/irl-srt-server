version: 2
updates:
  # C++/CMake repo — no npm or cargo manifests; GitHub Actions + Docker base.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]

  # Keep the digest-pinned Alpine base image in the Dockerfile current.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
