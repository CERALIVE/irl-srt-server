name: Build Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege default; jobs escalate only what they need.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Docker build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # The production Dockerfile is the single source of truth for the build:
      # it builds libsrt from irlserver/srt@belabox (which defines
      # SRTO_SRTLAPATCHES, required by src/core/SLSSrt.cpp) and links
      # irl-srt-server against it. Exercising `docker build` here keeps CI
      # from ever drifting from how the image is actually produced.
      # --load imports the image into the local daemon so the verify step's
      # `docker run` can find it; GHA layer cache makes reruns cheap.
      - name: Build production image
        run: >-
          docker buildx build --load --tag irl-srt-server:ci
          --cache-from type=gha --cache-to type=gha,mode=max .

      - name: Verify binaries
        run: |
          # The production image must ship srt_server and must NOT ship the
          # srt_client load/test tool (it only exists in the build stage).
          docker run --rm --entrypoint sh irl-srt-server:ci -c \
            'ls -l /usr/local/bin/srt_server && ! ls /usr/local/bin/srt_client 2>/dev/null'

      # Fail the build on any HIGH/CRITICAL OS/library CVE in the produced
      # image. ignore-unfixed keeps the gate on actionable (patch-available)
      # findings so an unfixable upstream base CVE cannot wedge the merge.
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: irl-srt-server:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      # Publish a CycloneDX SBOM of the produced image as a build artifact for
      # supply-chain provenance. One per arch leg to avoid name collisions.
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: irl-srt-server:ci
          format: cyclonedx-json
          output-file: sbom-${{ matrix.arch }}.cdx.json
          artifact-name: sbom-${{ matrix.arch }}.cdx.json
          upload-artifact: true

  # Advisory CodeQL pass. The C++ build is libsrt-dependent and lives in the
  # Dockerfile, so we analyze in no-build mode (build-mode: none) to surface
  # findings without replicating the production build. continue-on-error keeps
  # a fresh baseline of pre-existing findings from ever wedging the merge gate.
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
