name: Build Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-22.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git libssl-dev tclsh pkg-config

      - name: Build and install libsrt
        run: |
          git clone --depth 1 --branch v1.5.3 https://github.com/Haivision/srt.git /tmp/srt
          cmake -S /tmp/srt -B /tmp/srt/build -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTING=OFF
          cmake --build /tmp/srt/build -j$(nproc)
          sudo cmake --install /tmp/srt/build
          sudo ldconfig

      - name: Build irl-srt-server
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Verify binaries
        run: |
          ls -la build/bin/srt_server build/bin/srt_client
          file build/bin/srt_server build/bin/srt_client

      - name: Build Summary
        run: |
          echo "## ✅ Build Check Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture:** ${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Runner:** ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
