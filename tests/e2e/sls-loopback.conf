# Minimal single-server config for the SRT loopback e2e (tests/e2e/srt_loopback.sh).
# Everything binds on 127.0.0.1 inside the container: the L3 direct publisher on
# 4001, players on 4000, plus the L1/L2 SRTLA profile listeners on 4002/4003 so
# the e2e proves all three profiles parse and each emits a distinct startup
# "SRT profile:" line. streamid format is <domain>/<app>/<name>, so the publisher
# uses publish/live/<name> and the player uses play/live/<name>.
srt {
    worker_threads 1;
    worker_connections 100;
    http_port 8181;
    # Fixed key so the e2e can read /stats (the NAK/retransmit differential in
    # tests/e2e/srt_loopback.sh). Loopback-only, never a production credential.
    api_keys e2e-loopback-key;
    log_level info;
    pidfile /tmp/sls_server.pid;

    server {
        listen_player 4000;
        listen_publisher 4001;                # L3 direct
        listen_publisher_srtla 4002;          # L1 freeze+NAK
        listen_publisher_srtla_classic 4003;  # L2 Classic (freeze, NAK off)

        latency_min 200;
        latency_max 5000;

        domain_player play;
        domain_publisher publish;
        default_sid publish/live/feed1;

        backlog 100;
        idle_streams_timeout 30;

        app {
            app_player live;
            app_publisher live;
            allow publish all;
            allow play all;
        }
    }
}
