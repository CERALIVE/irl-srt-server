# Minimal single-server config for the SRT loopback e2e (tests/e2e/srt_loopback.sh).
# Everything binds on 127.0.0.1 inside the container: publishers on 4001,
# players on 4000. streamid format is <domain>/<app>/<name>, so the publisher
# uses publish/live/<name> and the player uses play/live/<name>.
srt {
    worker_threads 1;
    worker_connections 100;
    http_port 8181;
    log_level info;
    pidfile /tmp/sls_server.pid;

    server {
        listen_player 4000;
        listen_publisher 4001;

        latency_min 200;
        latency_max 5000;

        domain_player play;
        domain_publisher publish;
        default_sid publish/live/feed1;

        backlog 100;
        idle_streams_timeout 30;

        app {
            app_player live;
            app_publisher live;
            allow publish all;
            allow play all;
        }
    }
}
