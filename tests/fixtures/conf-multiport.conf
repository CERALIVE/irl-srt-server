# Fixture for the conf-parse characterization test (todo 12). Exercises the
# multi-port list + inclusive-range portlist syntax through the REAL conf.cpp
# loader (sls_conf_open -> sls_conf_set_portlist -> stored spec), not just the
# standalone sls_parse_port_list covered by test_conf_validation.cpp. Each
# receive/serve directive uses a different portlist form so the loader's
# expansion of a comma list, an ascending range, and a list+range mix is locked.
srt {
    worker_threads 1;
    worker_connections 100;
    http_port 8181;

    server {
        listen_player 4000,4010,5000-5002;     # list + range -> 4000,4010,5000,5001,5002
        listen_publisher 4001,4002;            # plain comma list -> 4001,4002
        listen_publisher_srtla 6000-6003;      # ascending range -> 6000,6001,6002,6003
        listen_publisher_srtla_classic 7000;   # single port -> 7000

        domain_player play;
        domain_publisher publish;
        default_sid publish/live/feed1;

        app {
            app_player live;
            app_publisher live;
            allow publish all;
            allow play all;
        }
    }
}
